<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gold Rush .io</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a2e; font-family: Arial; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; z-index: 10; }
        #status { position: absolute; top: 10px; right: 10px; color: gold; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; z-index: 10; }
        #offline-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a2e; z-index: 9999; color: white; text-align: center; padding-top: 30%; font-family: Arial; }
        #offline-overlay h2 { font-size: 24px; margin: 20px 0 10px; }
        #offline-overlay p { color: #aaa; margin-bottom: 30px; }
        #offline-overlay button { background: #3498db; color: white; border: none; padding: 14px 32px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">🏆 Очки: <span id="score">0</span></div>
    <div id="status">🔄 Подключение...</div>
    <canvas id="canvas"></canvas>

    <div id="offline-overlay">
        <div style="font-size: 80px;">📡</div>
        <h2>Нет подключения к интернету</h2>
        <p>Проверьте соединение и попробуйте снова</p>
        <button onclick="window.location.reload()">🔄 Обновить</button>
    </div>

    <script>
        var canvas = document.getElementById('canvas');
        var ctx = canvas.getContext('2d');
        var scoreSpan = document.getElementById('score');
        var statusDiv = document.getElementById('status');
        var offlineOverlay = document.getElementById('offline-overlay');
        var myId = '';
        var players = {};
        var gold = { x: 400, y: 300 };
        var ws = null;
        var reconnectTimer = null;

        // ЗАГЛУШКА ПРИ ПОТЕРЕ ИНТЕРНЕТА
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineOverlay.style.display = 'none';
                canvas.style.display = 'block';
            } else {
                offlineOverlay.style.display = 'block';
                canvas.style.display = 'none';
            }
        }
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        function connect() {
            var protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            var host = window.location.host;
            var wsUrl = protocol + '//' + host;
            console.log('Подключаюсь к: ' + wsUrl);
            statusDiv.innerHTML = '🔄 Подключение...';
            ws = new WebSocket(wsUrl);
            ws.onopen = function() {
                console.log('Подключен!');
                statusDiv.innerHTML = '⭐ В ИГРЕ!';
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };
            ws.onmessage = function(event) {
                try {
                    var data = JSON.parse(event.data);
                    if (data.type === 'init') { myId = data.playerId; players = data.players; gold = data.gold; }
                    else if (data.type === 'playerJoined') { players[data.player.id] = data.player; }
                    else if (data.type === 'playerMove') { if (players[data.playerId]) { players[data.playerId].x = data.x; players[data.playerId].y = data.y; } }
                    else if (data.type === 'goldUpdate') { players = data.players; gold = data.gold; }
                    else if (data.type === 'playerLeft') { delete players[data.playerId]; }
                    if (players[myId]) { scoreSpan.innerText = players[myId].score || 0; }
                } catch (e) { console.error('Ошибка:', e); }
            };
            ws.onerror = function() { statusDiv.innerHTML = '❌ Ошибка соединения'; };
            ws.onclose = function() {
                statusDiv.innerHTML = '🔌 Соединение разорвано. Переподключение...';
                if (!reconnectTimer) { reconnectTimer = setTimeout(connect, 3000); }
            };
        }
        connect();

        canvas.addEventListener('mousemove', function(e) {
            if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: 'move', x: e.clientX, y: e.clientY })); }
        });
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: 'move', x: e.touches[0].clientX, y: e.touches[0].clientY })); }
        });
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({ type: 'move', x: e.touches[0].clientX, y: e.touches[0].clientY })); }
        });

        function draw() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#2a2a4e';
            ctx.lineWidth = 0.5;
            for (var i = 0; i < canvas.width; i += 50) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke(); }
            for (var i = 0; i < canvas.height; i += 50) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke(); }
            if (gold) {
                ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 40; ctx.fillStyle = '#FFD700';
                ctx.beginPath(); ctx.arc(gold.x, gold.y, 25, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
            }
            Object.keys(players).forEach(function(id) {
                var p = players[id];
                var isMe = (id === myId);
                ctx.shadowColor = isMe ? '#3498db' : '#e74c3c'; ctx.shadowBlur = 25;
                ctx.fillStyle = isMe ? '#3498db' : '#e74c3c';
                ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0; ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(p.x-5, p.y-5, 5, 0, Math.PI * 2); ctx.fill();
                ctx.font = 'bold 16px Arial'; ctx.fillStyle = 'white'; ctx.shadowColor = 'black'; ctx.shadowBlur = 5;
                ctx.textAlign = 'center'; ctx.fillText(p.score || 0, p.x, p.y - 30);
            });
            ctx.shadowBlur = 0;
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
